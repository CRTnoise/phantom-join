<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHANTOM // ROOM INVITE</title>
  <meta name="description" content="You've been invited to a Phantom encrypted room. Click to join.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #08080c;
      --bg2:      #0d0d14;
      --bg3:      #12121c;
      --accent:   #00ff88;
      --accent2:  #00cc6a;
      --dim:      rgba(0,255,136,.12);
      --dim2:     rgba(0,255,136,.06);
      --txt:      #c8cfd8;
      --txt-dim:  #5a6070;
      --brd:      rgba(0,255,136,.18);
      --mono:     'Share Tech Mono', monospace;
      --sans:     'Barlow Condensed', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--txt);
      font-family: var(--mono);
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridShift {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.12) 2px,
        rgba(0,0,0,.12) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      gap: 0;
    }

    /* Top ledger */
    .ledger {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 24px;
      border-bottom: 1px solid var(--brd);
      font-size: 10px;
      letter-spacing: .14em;
      color: var(--txt-dim);
      background: rgba(8,8,12,.7);
      backdrop-filter: blur(4px);
    }
    .ledger .live {
      color: var(--accent);
      animation: blink 1.4s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Card */
    .card {
      width: 100%;
      max-width: 520px;
      border: 1px solid var(--brd);
      background: var(--bg2);
      padding: 48px 40px 40px;
      position: relative;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Corner ticks */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
    }
    .card::before {
      top: -1px; left: -1px;
      border-top: 2px solid var(--accent);
      border-left: 2px solid var(--accent);
    }
    .card::after {
      bottom: -1px; right: -1px;
      border-bottom: 2px solid var(--accent);
      border-right: 2px solid var(--accent);
    }

    .mark {
      font-size: 32px;
      color: var(--accent);
      margin-bottom: 20px;
      display: block;
      line-height: 1;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .6; }
    }

    .title {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .2em;
      color: var(--txt-dim);
      margin-bottom: 6px;
    }

    .headline {
      font-family: var(--sans);
      font-size: 32px;
      font-weight: 700;
      letter-spacing: .04em;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 28px;
    }

    /* Divider */
    .div {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .div::before, .div::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--brd);
    }
    .div span {
      font-size: 9px;
      letter-spacing: .12em;
      color: var(--txt-dim);
    }

    /* Room code display */
    .code-block {
      background: var(--bg3);
      border: 1px solid var(--brd);
      padding: 16px 20px;
      margin-bottom: 28px;
      position: relative;
    }
    .code-label {
      font-size: 9px;
      letter-spacing: .14em;
      color: var(--txt-dim);
      margin-bottom: 8px;
    }
    .code-value {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: .1em;
      color: var(--accent);
      word-break: break-all;
      user-select: all;
    }

    /* Primary CTA */
    .btn-launch {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      background: var(--accent);
      color: #08080c;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: bold;
      letter-spacing: .14em;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s, transform .1s;
      margin-bottom: 12px;
    }
    .btn-launch:hover  { background: var(--accent2); }
    .btn-launch:active { transform: scale(.98); }
    .btn-launch .arrow { font-size: 16px; }

    /* Secondary hint */
    .hint {
      font-size: 10px;
      color: var(--txt-dim);
      letter-spacing: .06em;
      text-align: center;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .hint a { color: var(--txt-dim); text-decoration: underline; }
    .hint a:hover { color: var(--accent); }

    /* Status strip */
    .status-row {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--brd);
      padding-top: 16px;
      margin-top: 4px;
    }
    .stat {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat + .stat { border-left: 1px solid var(--brd); padding-left: 16px; }
    .stat .k { font-size: 9px; letter-spacing: .1em; color: var(--txt-dim); }
    .stat .v { font-size: 11px; color: var(--txt); }
    .stat .v.ok { color: var(--accent); }

    /* No-code state */
    .no-code { text-align: center; padding: 16px 0; }
    .no-code .err { font-size: 13px; color: #ff4466; margin-bottom: 8px; }
    .no-code small { font-size: 10px; color: var(--txt-dim); }

    /* Countdown */
    #countdown {
      font-size: 11px;
      color: var(--txt-dim);
      text-align: center;
      margin-bottom: 12px;
      letter-spacing: .08em;
      height: 16px;
    }
  </style>
</head>
<body>

  <div class="ledger">
    <span>PHANTOM &middot; INVITE GATEWAY</span>
    <span>E2E &middot; P2P &middot; ZERO-SERVER</span>
    <span class="live">&#x25CF; LIVE</span>
  </div>

  <div class="page">
    <div class="card" id="card">
      <!-- content injected by JS -->
    </div>
  </div>

  <script>
    // ── Parse code from URL ──────────────────────────────────────────
    const params   = new URLSearchParams(location.search);
    const rawCode  = params.get('code') || params.get('c') || '';
    const code     = rawCode.toUpperCase().trim();
    const deepLink = code ? 'phantom://join/' + encodeURIComponent(code) : '';

    // ── Validate format (client-side, no crypto) ─────────────────────
    const VALID_FORMAT = /^PH-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{2}$/.test(code);

    const card = document.getElementById('card');

    if (!code || !VALID_FORMAT) {
      card.innerHTML = `
        <span class="mark">&#x2B21;</span>
        <p class="title">PHANTOM // INVITE GATEWAY</p>
        <div class="no-code">
          <p class="err">&#x26A0; INVALID OR MISSING ROOM CODE</p>
          <small>This invite link is malformed. Ask the sender to copy a fresh link from Phantom.</small>
        </div>`;
    } else {
      // ── Render invite card ─────────────────────────────────────────
      card.innerHTML = `
        <span class="mark">&#x2B21;</span>
        <p class="title">PHANTOM // ENCRYPTED ROOM INVITE</p>
        <p class="headline">You've been<br>invited.</p>

        <div class="div"><span>// ROOM CODE //</span></div>

        <div class="code-block">
          <p class="code-label">COPY THIS INTO PHANTOM &rarr; ROOM FIELD</p>
          <p class="code-value" id="code-val">${code}</p>
        </div>

        <div id="countdown"></div>

        <a href="${deepLink}" class="btn-launch" id="btn-launch">
          <span>&#x25B6;&nbsp; LAUNCH PHANTOM</span>
          <span class="arrow">&rarr;</span>
        </a>

        <p class="hint" id="hint-text">
          If Phantom doesn't open automatically, <a href="${deepLink}">click here</a>.<br>
          Don't have Phantom? Download it and paste the room code above.
        </p>

        <div class="status-row">
          <div class="stat">
            <span class="k">KEY EXCHANGE</span>
            <span class="v">X25519</span>
          </div>
          <div class="stat">
            <span class="k">CIPHER</span>
            <span class="v">XSalsa20·Poly1305</span>
          </div>
          <div class="stat">
            <span class="k">SERVER</span>
            <span class="v ok">— NONE —</span>
          </div>
        </div>`;

      // ── Auto-redirect countdown ──────────────────────────────────
      const cdEl = document.getElementById('countdown');
      let secs = 3;

      const tick = () => {
        if (secs <= 0) {
          cdEl.textContent = 'Opening Phantom…';
          // Attempt to launch via protocol handler
          window.location.href = deepLink;
          return;
        }
        cdEl.textContent = 'Opening Phantom in ' + secs + 's… (or click the button below)';
        secs--;
        setTimeout(tick, 1000);
      };
      tick();
    }
  </script>
</body>
</html>
